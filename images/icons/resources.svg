<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- book body -->
  <rect x="12" y="10" width="56" height="72" rx="4" fill="none" stroke="#222" stroke-width="5"/>
  <!-- spine line -->
  <line x1="26" y1="10" x2="26" y2="82" stroke="#222" stroke-width="4"/>
  <!-- bookmark -->
  <polyline points="40,10 40,28 47,22 54,28 54,10" fill="none" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
  <!-- magnifying glass -->
  <circle cx="72" cy="72" r="18" fill="none" stroke="#222" stroke-width="5"/>
  <line x1="84" y1="84" x2="95" y2="95" stroke="#222" stroke-width="6" stroke-linecap="round"/>
</svg>
